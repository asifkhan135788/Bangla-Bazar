<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bgGradient)" />
  <!-- Decorative circles -->
  <circle cx="100" cy="350" r="80" fill="#FFD700" opacity="0.05" />
  <circle cx="1100" cy="50" r="120" fill="#FFD700" opacity="0.05" />
  <circle cx="600" cy="380" r="150" fill="#FFD700" opacity="0.03" />
  <!-- Decorative lines -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#FFD700" stroke-width="0.5" opacity="0.2" />
  <line x1="800" y2="200" x2="1200" y2="200" stroke="#FFD700" stroke-width="0.5" opacity="0.2" />
  <!-- Main text -->
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#goldGradient)" filter="url(#glow)" letter-spacing="8">
    BANGLA BAZAR
  </text>
  <!-- Subtitle -->
  <text x="600" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#FFFFFF" opacity="0.7" letter-spacing="4">
    BANGLADESH'S FAVORITE ONLINE STORE
  </text>
  <!-- Decorative separator -->
  <rect x="540" y="248" width="120" height="2" rx="1" fill="#FFD700" opacity="0.6" />
</svg>
