<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="placeholderBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#placeholderBg)" rx="8"/>

  <!-- Dashed border -->
  <rect x="12" y="12" width="376" height="376" rx="6" fill="none" stroke="#ddd" stroke-width="2" stroke-dasharray="12,8"/>

  <!-- Shopping bag icon silhouette -->
  <g transform="translate(155, 110)">
    <!-- Bag body -->
    <path d="M10,50 L10,140 Q10,150 20,150 L70,150 Q80,150 80,140 L80,50 Z" 
          fill="none" stroke="#ccc" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- Bag handle -->
    <path d="M28,50 L28,35 Q28,15 45,15 Q62,15 62,35 L62,50" 
          fill="none" stroke="#ccc" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Bag detail line -->
    <line x1="25" y1="75" x2="65" y2="75" stroke="#ccc" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Small tag -->
    <rect x="65" y="55" width="18" height="12" rx="2" fill="none" stroke="#ccc" stroke-width="2" transform="rotate(15, 74, 61)"/>
    <line x1="69" y1="58" x2="69" y2="64" stroke="#ccc" stroke-width="1.5" transform="rotate(15, 74, 61)"/>
  </g>

  <!-- "BD Shop" text -->
  <text x="200" y="310" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="22" fill="#999" font-weight="500" letter-spacing="2">
    BD Shop
  </text>

  <!-- Subtle tagline -->
  <text x="200" y="335" text-anchor="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="12" fill="#bbb" letter-spacing="1">
    Product Image
  </text>
</svg>