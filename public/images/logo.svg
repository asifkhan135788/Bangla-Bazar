<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%"><defs><style>.bg-rect{fill:#f4f4f0}.bb-shape{fill:transparent;stroke-width:8;stroke-dasharray:1200;stroke-dashoffset:1200;stroke-linejoin:round;stroke-linecap:round}.b-left{stroke:#fff100;animation:drawOutline 1.5s ease-in-out forwards,fillSolidLeft .5s ease-in-out forwards 1.5s,floatShape 4s ease-in-out infinite 2.5s}.b-right{stroke:#0f6;animation:drawOutline 1.5s ease-in-out .5s forwards,fillSolidRight .5s ease-in-out forwards 2s,floatShape 4s ease-in-out infinite 3s}.shadow-shape{fill:#000;opacity:0}.shadow-left{animation:popOut .4s cubic-bezier(.175,.885,.32,1.275) forwards 2s,floatShadow 4s ease-in-out infinite 2.5s}.shadow-right{animation:popOut .4s cubic-bezier(.175,.885,.32,1.275) forwards 2.5s,floatShadow 4s ease-in-out infinite 3s}@keyframes drawOutline{100%{stroke-dashoffset:0}}@keyframes fillSolidLeft{100%{fill:#fff100;stroke:#000;stroke-width:10}}@keyframes fillSolidRight{100%{fill:#0f6;stroke:#000;stroke-width:10}}@keyframes popOut{0%{opacity:0;transform:translate(0,0)}100%{opacity:1;transform:translate(15px,15px)}}@keyframes floatShape{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}@keyframes floatShadow{0%,100%{transform:translate(15px,15px)}50%{transform:translate(15px,25px)}}.cyber-text{font-family:'Courier New',Courier,monospace;font-size:28px;font-weight:900;fill:#000;opacity:0;animation:glitchReveal 1s forwards 3s}@keyframes glitchReveal{0%{opacity:0;transform:skewX(-20deg) translateX(-20px)}20%{opacity:1;transform:skewX(20deg) translateX(10px);fill:#fff100}40%{transform:skewX(-10deg);fill:#0f6}60%{transform:skewX(10deg);fill:#000}100%{opacity:1;transform:skewX(0) translateX(0);fill:#000}}</style><path id="brutal-B" d="M 0 0 L 100 0 C 150 0 150 60 120 80 C 170 100 160 180 100 180 L 0 180 Z M 40 40 V 70 H 90 C 110 70 110 40 90 40 Z M 40 110 V 145 H 95 C 120 145 120 110 95 110 Z" fill-rule="evenodd"/></defs><rect width="600" height="500" class="bg-rect"/><g transform="translate(160, 100)"><use href="#brutal-B" class="shadow-shape shadow-left"/><use href="#brutal-B" class="bb-shape b-left"/></g><g transform="translate(290, 140)"><use href="#brutal-B" class="shadow-shape shadow-right"/><use href="#brutal-B" class="bb-shape b-right"/></g></svg>
